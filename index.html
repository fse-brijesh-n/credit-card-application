
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credit Card Application System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22CreditCard%20App%22%2C%22short_name%22%3A%22CreditCard%22%2C%22start_url%22%3A%22.%2Findex.html%22%2C%22display%22%3A%22standalone%22%2C%22theme_color%22%3A%22%231976d2%22%2C%22background_color%22%3A%22%23ffffff%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20fill%3D'%231976d2'%20width%3D'100'%20height%3D'100'%2F%3E%3Ctext%20x%3D'10'%20y%3D'70'%20font-size%3D'70'%3E%F0%9F%92%B3%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
  <style>
    body { padding-top: 70px; }
    .navbar-brand { font-weight: bold; }
    .card { margin-bottom: 20px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#/">💳 CreditCard App</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto" id="navLinks"></ul>
        <span class="navbar-text text-white" id="userInfo"></span>
        <button class="btn btn-outline-light ms-2" id="logoutBtn" style="display:none;">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container" id="app"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ════════════════ CONFIG ════════════════
    const API_BASE = 'http://localhost:8080';

    // ════════════════ STATE ════════════════
    let authToken = localStorage.getItem('token') || null;

    // ════════════════ HELPERS ════════════════
    function parseJwt(token) {
      try {
        return JSON.parse(atob(token.split('.')[1]));
      } catch { return null; }
    }

    function getHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      };
    }

    async function apiGet(url) {
      const res = await fetch(API_BASE + url, { headers: getHeaders() });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function apiPost(url, body = {}) {
      const res = await fetch(API_BASE + url, {
        method: 'POST', headers: getHeaders(), body: JSON.stringify(body)
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function apiPut(url, body = {}) {
      const res = await fetch(API_BASE + url, {
        method: 'PUT', headers: getHeaders(), body: JSON.stringify(body)
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function apiDelete(url) {
      const res = await fetch(API_BASE + url, {
        method: 'DELETE', headers: getHeaders()
      });
      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      return res.text();
    }

    function logout() {
      localStorage.removeItem('token');
      authToken = null;
      updateNav();
      window.location.hash = '#/login';
    }

    function updateNav() {
      const navLinks = document.getElementById('navLinks');
      const userInfo = document.getElementById('userInfo');
      const logoutBtn = document.getElementById('logoutBtn');
      navLinks.innerHTML = '';
      if (!authToken) {
        userInfo.textContent = '';
        logoutBtn.style.display = 'none';
        navLinks.innerHTML = `
          <li class="nav-item"><a class="nav-link" href="#/login">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="#/register">Register</a></li>`;
        return;
      }
      const payload = parseJwt(authToken);
      if (!payload) { logout(); return; }
      const role = payload.role;
      userInfo.textContent = `👤 ${payload.sub} (${role})`;
      logoutBtn.style.display = 'inline-block';

      if (role === 'ROLE_ADMIN') {
        navLinks.innerHTML = `
          <li class="nav-item"><a class="nav-link" href="#/admin/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="#/admin/applications">Applications</a></li>
          <li class="nav-item"><a class="nav-link" href="#/admin/customers">Customers</a></li>
          <li class="nav-item"><a class="nav-link" href="#/admin/blacklist">Blacklist</a></li>`;
      } else {
        navLinks.innerHTML = `
          <li class="nav-item"><a class="nav-link" href="#/user/dashboard">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="#/user/apply">Apply</a></li>
          <li class="nav-item"><a class="nav-link" href="#/user/applications">My Apps</a></li>`;
      }
    }

    // ════════════════ ROUTER ════════════════
    function statusColor(s) {
      const map = { SUBMITTED:'secondary', UNDER_REVIEW:'warning', APPROVED:'success', REJECTED:'danger', REFERRED_BACK:'info', CARD_ISSUED:'primary' };
      return map[s] || 'dark';
    }

    function renderPage(hash) {
      const app = document.getElementById('app');
      const path = hash.replace('#', '') || '/';
      try {
        if (!authToken && !['/login','/register'].includes(path)) {
          window.location.hash = '#/login';
          return;
        }
        switch (path) {
          case '/login': renderLogin(); break;
          case '/register': renderRegister(); break;
          case '/user/dashboard': app.innerHTML = '<h2>Dashboard</h2><p>Welcome!</p>'; break;
          case '/user/apply': renderApply(); break;
          case '/user/applications': renderUserApps(); break;
          case '/admin/dashboard': app.innerHTML = '<h2>Admin Dashboard</h2>'; break;
          case '/admin/applications': renderAdminApps(); break;
          case '/admin/customers': renderCustomers(); break;
          case '/admin/blacklist': renderBlacklist(); break;
          default:
            if (path.startsWith('/user/applications/')) {
              const id = path.split('/').pop();
              renderAppDetail(id);
            } else if (path.startsWith('/admin/issue/')) {
              const appId = path.split('/').pop();
              renderIssueCard(appId);
            } else {
              app.innerHTML = '<div class="alert alert-danger">Page not found</div>';
            }
        }
      } catch (err) {
        app.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }

    window.addEventListener('hashchange', () => renderPage(window.location.hash));
    window.addEventListener('load', () => {
      updateNav();
      if (!authToken) {
        window.location.hash = '#/login';
      } else {
        renderPage(window.location.hash);
      }
      // PWA Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(
          `self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))))`
        )).catch(()=>{});
      }
    });

    // ════════════════ PAGES ════════════════
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="row justify-content-center"><div class="col-md-4">
          <h2>Login</h2>
          <form id="loginForm">
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input type="password" class="form-control mb-2" name="password" placeholder="Password" required>
            <button class="btn btn-primary w-100" type="submit">Login</button>
            <p class="mt-2">New? <a href="#/register">Register</a></p>
          </form>
          <div id="loginError" class="text-danger"></div>
        </div></div>`;
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { email, password } = e.target;
        try {
          const data = await apiPost('/auth/login', { email: email.value, password: password.value });
          authToken = data.token;
          localStorage.setItem('token', authToken);
          updateNav();
          const role = parseJwt(authToken).role;
          window.location.hash = role === 'ROLE_ADMIN' ? '#/admin/dashboard' : '#/user/dashboard';
        } catch (err) {
          document.getElementById('loginError').textContent = err.message;
        }
      });
    }

    function renderRegister() {
      document.getElementById('app').innerHTML = `
        <div class="row justify-content-center"><div class="col-md-4">
          <h2>Register</h2>
          <form id="registerForm">
            <input class="form-control mb-2" name="fullName" placeholder="Full Name" required>
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input type="password" class="form-control mb-2" name="password" placeholder="Password" required minlength="6">
            <button class="btn btn-success w-100" type="submit">Register</button>
            <p class="mt-2">Have account? <a href="#/login">Login</a></p>
          </form>
          <div id="registerError" class="text-danger"></div>
        </div></div>`;
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const { fullName, email, password } = e.target;
        try {
          await apiPost('/auth/register', {
            fullName: fullName.value, email: email.value, password: password.value
          });
          alert('Registered! Please login.');
          window.location.hash = '#/login';
        } catch (err) {
          document.getElementById('registerError').textContent = err.message;
        }
      });
    }

    function renderApply() {
      document.getElementById('app').innerHTML = `
        <h2>Apply for Credit Card</h2>
        <form id="applyForm">
          <input type="number" step="0.01" class="form-control mb-2" name="income" placeholder="Annual Income" required>
          <select class="form-select mb-2" name="employmentType" required>
            <option value="">Employment Type</option>
            <option>SALARIED</option><option>SELF_EMPLOYED</option><option>UNEMPLOYED</option>
          </select>
          <input class="form-control mb-2" name="employerName" placeholder="Employer Name">
          <input type="number" class="form-control mb-2" name="employmentYears" placeholder="Years of Employment" min="0">
          <button class="btn btn-primary w-100" type="submit">Submit</button>
        </form>
        <div id="applyError" class="text-danger"></div>`;
      document.getElementById('applyForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const f = e.target;
        try {
          await apiPost('/apply', {
            income: parseFloat(f.income.value),
            employmentType: f.employmentType.value,
            employerName: f.employerName.value || null,
            employmentYears: f.employmentYears.value ? parseInt(f.employmentYears.value) : null
          });
          alert('Application submitted!');
          window.location.hash = '#/user/applications';
        } catch (err) {
          document.getElementById('applyError').textContent = err.message;
        }
      });
    }

    async function renderUserApps() {
      try {
        const apps = await apiGet('/applications/my');
        let html = `<h2>My Applications</h2>
          <table class="table"><thead><tr><th>ID</th><th>Status</th><th>Income</th><th>Employment</th><th>Date</th></tr></thead><tbody>`;
        apps.forEach(a => {
          html += `<tr>
            <td><a href="#/user/applications/${a.applicationId}">#${a.applicationId}</a></td>
            <td><span class="badge bg-${statusColor(a.status)}">${a.status}</span></td>
            <td>$${a.income}</td>
            <td>${a.employmentType}</td>
            <td>${new Date(a.createdAt).toLocaleDateString()}</td>
          </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('app').innerHTML = html;
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }

    async function renderAppDetail(id) {
      try {
        const a = await apiGet(`/applications/${id}`);
        document.getElementById('app').innerHTML = `
          <h2>Application #${id}</h2>
          <p>Status: <span class="badge bg-${statusColor(a.status)}">${a.status}</span></p>
          <p>Income: $${a.income}</p>
          <p>Employment: ${a.employmentType}${a.employerName ? ' at ' + a.employerName : ''} (${a.employmentYears||0} yrs)</p>
          ${a.creditScore != null ? `<p>Credit Score: ${a.creditScore} (${a.creditScoreValid ? '✅' : '❌'})</p>` : ''}
          <p>Checks: Income ${a.incomeValid?'✅':'❌'}, Employment ${a.employmentValid?'✅':'❌'}, Fraud ${a.fraudCheckPassed?'✅':'❌'}</p>
          <p>Remarks: ${a.remarks || 'None'}</p>
          <a href="#/user/applications" class="btn btn-secondary">Back</a>`;
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }

    // ─── ADMIN PAGES ────────────────────────────
    async function renderAdminApps() {
      try {
        const apps = await apiGet('/admin/applications');
        let html = `<h2>All Applications</h2>
          <table class="table table-bordered"><thead><tr><th>ID</th><th>User</th><th>Status</th><th>Checks</th><th>Actions</th></tr></thead><tbody>`;
        apps.forEach(a => {
          const checks = `${a.incomeValid?'I✅':'I❌'} ${a.employmentValid?'E✅':'E❌'} ${a.creditScoreValid?'C✅':'C❌'} ${a.fraudCheckPassed?'F✅':'F❌'}`;
          html += `<tr>
            <td>${a.applicationId}</td><td>${a.userFullName} (${a.userEmail})</td>
            <td><span class="badge bg-${statusColor(a.status)}">${a.status}</span></td>
            <td>${checks}</td>
            <td>${adminActionBtns(a)}</td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('app').innerHTML = html;
        attachAdminEvents();
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }

    function adminActionBtns(a) {
      return `
        <button class="btn btn-sm btn-outline-primary reviewBtn" data-id="${a.applicationId}">Review</button>
        <button class="btn btn-sm btn-outline-success approveBtn" data-id="${a.applicationId}" ${(a.status!=='SUBMITTED'&&a.status!=='UNDER_REVIEW')?'disabled':''}>Approve</button>
        <button class="btn btn-sm btn-outline-danger rejectBtn" data-id="${a.applicationId}">Reject</button>
        <button class="btn btn-sm btn-outline-warning referBtn" data-id="${a.applicationId}">Refer Back</button>
        <div class="btn-group">
          <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">Check</button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item checkScore" href="#" data-id="${a.applicationId}">Score</a></li>
            <li><a class="dropdown-item checkIncome" href="#" data-id="${a.applicationId}">Income</a></li>
            <li><a class="dropdown-item checkEmployment" href="#" data-id="${a.applicationId}">Employment</a></li>
            <li><a class="dropdown-item checkFraud" href="#" data-id="${a.applicationId}">Fraud</a></li>
          </ul>
        </div>
        ${a.status==='APPROVED' ? `<a href="#/admin/issue/${a.applicationId}" class="btn btn-sm btn-success">Issue Card</a>` : ''}`;
    }

    function attachAdminEvents() {
      document.querySelectorAll('.reviewBtn').forEach(b => b.addEventListener('click', async (e) => {
        await apiPut(`/admin/applications/${e.target.dataset.id}/review`); renderAdminApps();
      }));
      document.querySelectorAll('.approveBtn').forEach(b => b.addEventListener('click', async (e) => {
        try { await apiPut(`/admin/applications/${e.target.dataset.id}/approve`); renderAdminApps(); }
        catch(err) { alert(err.message); }
      }));
      document.querySelectorAll('.rejectBtn').forEach(b => b.addEventListener('click', async (e) => {
        await apiPut(`/admin/applications/${e.target.dataset.id}/reject`); renderAdminApps();
      }));
      document.querySelectorAll('.referBtn').forEach(b => b.addEventListener('click', async (e) => {
        await apiPut(`/admin/applications/${e.target.dataset.id}/refer-back`); renderAdminApps();
      }));
      document.querySelectorAll('.checkScore').forEach(a => a.addEventListener('click', async (e) => {
        e.preventDefault();
        const id = e.target.dataset.id;
        const score = prompt('Enter credit score:');
        if (!score) return;
        await apiPut(`/admin/applications/${id}/check-score`, { creditScore: parseInt(score) });
        renderAdminApps();
      }));
      document.querySelectorAll('.checkIncome').forEach(a => a.addEventListener('click', async (e) => {
        e.preventDefault();
        await apiPut(`/admin/applications/${e.target.dataset.id}/check-income`);
        renderAdminApps();
      }));
      document.querySelectorAll('.checkEmployment').forEach(a => a.addEventListener('click', async (e) => {
        e.preventDefault();
        await apiPut(`/admin/applications/${e.target.dataset.id}/check-employment`);
        renderAdminApps();
      }));
      document.querySelectorAll('.checkFraud').forEach(a => a.addEventListener('click', async (e) => {
        e.preventDefault();
        await apiPut(`/admin/applications/${e.target.dataset.id}/check-fraud`);
        renderAdminApps();
      }));
    }

    async function renderCustomers() {
      try {
        const users = await apiGet('/admin/customers');
        let html = `<h2>Customers</h2>
          <input class="form-control mb-2" id="searchCust" placeholder="Search name/email...">
          <table class="table" id="custTable"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Blacklisted</th><th></th></tr></thead><tbody>`;
        users.forEach(u => {
          html += `<tr>
            <td>${u.userId}</td><td>${u.fullName}</td><td>${u.email}</td>
            <td>${u.blacklisted ? '🔴' : '🟢'}</td>
            <td><button class="btn btn-sm btn-${u.blacklisted?'success':'danger'} blacklistBtn" data-id="${u.userId}" data-bl="${u.blacklisted}">${u.blacklisted?'Unblock':'Blacklist'}</button></td></tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('app').innerHTML = html;
        document.getElementById('searchCust').addEventListener('input', async (e) => {
          const q = e.target.value;
          const res = await apiGet(`/admin/customers/search?name=${q}&email=${q}`);
          updateCustTable(res);
        });
        document.querySelectorAll('.blacklistBtn').forEach(b => b.addEventListener('click', async (e) => {
          const id = e.target.dataset.id;
          if (e.target.dataset.bl === 'true') await apiDelete(`/admin/blacklist/${id}`);
          else await apiPost(`/admin/blacklist/${id}`);
          renderCustomers();
        }));
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }
    function updateCustTable(custs) {
      const tbody = document.querySelector('#custTable tbody');
      if (!tbody) return;
      tbody.innerHTML = custs.map(u => `<tr><td>${u.userId}</td><td>${u.fullName}</td><td>${u.email}</td>
        <td>${u.blacklisted?'🔴':'🟢'}</td>
        <td><button class="btn btn-sm btn-${u.blacklisted?'success':'danger'} blacklistBtn" data-id="${u.userId}" data-bl="${u.blacklisted}">${u.blacklisted?'Unblock':'Blacklist'}</button></td></tr>`).join('');
      document.querySelectorAll('.blacklistBtn').forEach(b => b.addEventListener('click', async (e) => {
        const id = e.target.dataset.id;
        if (e.target.dataset.bl === 'true') await apiDelete(`/admin/blacklist/${id}`);
        else await apiPost(`/admin/blacklist/${id}`);
        renderCustomers();
      }));
    }

    async function renderBlacklist() {
      try {
        const users = await apiGet('/admin/blacklist');
        let html = `<h2>Blacklisted Users</h2><table class="table"><thead><tr><th>ID</th><th>Name</th><th>Email</th><th></th></tr></thead><tbody>`;
        users.forEach(u => html += `<tr><td>${u.userId}</td><td>${u.fullName}</td><td>${u.email}</td>
          <td><button class="btn btn-sm btn-success unblockBtn" data-id="${u.userId}">Unblock</button></td></tr>`);
        html += '</tbody></table>';
        document.getElementById('app').innerHTML = html;
        document.querySelectorAll('.unblockBtn').forEach(b => b.addEventListener('click', async (e) => {
          await apiDelete(`/admin/blacklist/${e.target.dataset.id}`);
          renderBlacklist();
        }));
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }

    async function renderIssueCard(appId) {
      try {
        const card = await apiPost(`/cards/issue/${appId}`);
        document.getElementById('app').innerHTML = `
          <h2>Card Issued</h2>
          <p>Card Number: ${card.cardNumber}</p><p>CVV: ${card.cvv}</p>
          <p>Expiry: ${card.expiryDate}</p><p>Holder: ${card.cardHolderName}</p>
          <a href="#/admin/applications" class="btn btn-primary">Back</a>`;
      } catch (err) {
        document.getElementById('app').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
